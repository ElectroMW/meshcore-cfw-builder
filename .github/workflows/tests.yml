name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "flask>=3.0.0" "pyopenssl>=26.0.0"
          pip install -r requirements-test.txt

      - name: Run backend tests
        run: pytest tests/test_backend.py -v --tb=short

  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "flask>=3.0.0" "pyopenssl>=26.0.0"
          pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run UI tests
        run: pytest tests/test_ui.py -v --tb=short --browser chromium
