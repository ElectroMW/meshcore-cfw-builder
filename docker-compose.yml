services:
  firmware-builder:
    build: .
    image: meshcore-firmware-builder
    container_name: meshcore-builder
    ports:
      # Host port 5000 → container port 5000
      - "5000:5000"
    volumes:
      - pio-cache:/root/.platformio
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      # Optional: override the firmware source repository (must be a public GitHub HTTPS URL)
      # - MESHCORE_REPO_URL=https://github.com/myfork/MeshCore.git
      # HTTPS is enabled by default using a self-signed certificate (requires pyopenssl).
      # Set SSL_ADHOC=false to disable HTTPS and serve plain HTTP instead.
      # - SSL_ADHOC=false
      # Optional: use your own certificate and key files instead of the self-signed cert.
      # When SSL_CERT and SSL_KEY are set, SSL_ADHOC is ignored.
      # - SSL_CERT=/certs/server.crt
      # - SSL_KEY=/certs/server.key
    restart: unless-stopped
    # Increase shared memory size – PlatformIO linker can use it heavily
    shm_size: 256m

volumes:
  pio-cache:
    # Named volume managed by Docker; survives container removal
    # To wipe the cache: docker volume rm firmware-builder_pio-cache
